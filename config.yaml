      description: 请帮我查找多模态大模型隐空间推理的相关论文。
      enabled: true
      paper_sources:
        - arxiv
      keywords:
        - keyword: multimodal large language model
          keyword_cn: 多模态大语言模型
          query: multimodal large language model reasoning in latent space
        - keyword: latent space reasoning
          keyword_cn: 隐空间推理
          query: latent space reasoning for multimodal models
        - keyword: reasoning in latent space
          keyword_cn: 隐空间中的推理
          query: reasoning in latent space of large models
        - keyword: multimodal reasoning
          keyword_cn: 多模态推理
          query: multimodal reasoning with latent variables
      intent_queries:
        - query: papers on reasoning in latent space of multimodal large language models
          query_cn: 多模态大语言模型隐空间推理的论文
          enabled: true
          source: manual
          note: ''
        - query: research about latent space reasoning for multimodal models
          query_cn: 关于多模态模型隐空间推理的研究
          enabled: true
          source: manual
          note: ''
        - query: multimodal large language model reasoning in latent space
          query_cn: 多模态大语言模型在隐空间中的推理
          enabled: true
          source: manual
          note: ''
      updated_at: '2026-07-20T09:28:04.867Z'
    - tag: seg-llm
