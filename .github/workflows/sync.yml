name: Upstream Sync

permissions:
  contents: write # 必须有写权限才能合并代码
  pages: write # 允许同步成功后主动请求 GitHub Pages 重新构建

on:
  schedule:
    - cron: "0 0 * * *" # 每天 UTC 0点（北京时间早8点）检查更新
  workflow_dispatch: # 允许用户手动点击触发

concurrency:
  group: upstream-sync
  cancel-in-progress: false

jobs:
  sync_latest_from_upstream:
    name: Sync latest commits from upstream repo
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: ${{ github.event.repository.fork }} # 只有 Fork 的仓库才运行

    steps:
      - name: Random delay to spread scheduled runs
        if: github.event_name == 'schedule'
        run: |
          DELAY=$(shuf -i 0-300 -n 1)
          echo "Sleeping ${DELAY}s (≈$((DELAY/60))min) to stagger fork runs …"
          sleep $DELAY

      # 1. 检出用户仓库的代码
      - name: Checkout target repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # 2. 配置 .gitattributes 中的 merge=ours 驱动，用于保护用户运行态文件
      - name: Configure protected merge driver
        run: |
          git config --global merge.ours.driver true

      # 3. 运行同步 Action
      - name: Sync upstream changes
        id: sync
        uses: aormsby/Fork-Sync-With-Upstream-action@v3.4
        with:
          # 👇 【重要】这里写死你的源仓库地址 (Developer's Repo)
          upstream_sync_repo: ziwenhahaha/daily-paper-reader
          upstream_sync_branch: main
          target_sync_branch: main
          target_repo_token: ${{ secrets.GITHUB_TOKEN }} # 自动生成，无需用户配置
          
          # 👇 【关键配置】设置为 'false' 表示进行 Git Merge (合并)，而不是覆盖
          # 默认行为其实就是 merge，但为了保险起见，不要开启 'hard_reset' 类的选项
          test_mode: false

      # 4. 如果同步失败（比如有冲突），打印错误
      - name: Sync check
        if: failure()
        run: |
          echo "[Error] 自动同步失败！可能是因为你修改了源代码导致冲突。"
          echo "请手动前往 GitHub 页面解决冲突。"
          exit 1

      # 5. workflow 使用 GITHUB_TOKEN 推送不会自动触发 Pages build，因此同步成功后主动请求重建。
      - name: Request GitHub Pages rebuild
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          API_ROOT="https://api.github.com/repos/${REPOSITORY}"
          AUTH_HEADER="Authorization: Bearer ${GH_TOKEN}"
          API_HEADER="X-GitHub-Api-Version: 2022-11-28"
          ACCEPT_HEADER="Accept: application/vnd.github+json"

          pages_status="$(curl -sS -o /tmp/dpr-pages-info.json -w "%{http_code}" \
            -H "${AUTH_HEADER}" \
            -H "${API_HEADER}" \
            -H "${ACCEPT_HEADER}" \
            "${API_ROOT}/pages")"

          if [ "${pages_status}" = "404" ]; then
            echo "[WARN] GitHub Pages 尚未启用，跳过 Pages rebuild。"
            exit 0
          fi

          if [ "${pages_status}" -lt 200 ] || [ "${pages_status}" -ge 300 ]; then
            echo "[WARN] 无法读取 GitHub Pages 状态，跳过 Pages rebuild。HTTP ${pages_status}"
            cat /tmp/dpr-pages-info.json || true
            exit 0
          fi

          build_status="$(curl -sS -X POST -o /tmp/dpr-pages-build.json -w "%{http_code}" \
            -H "${AUTH_HEADER}" \
            -H "${API_HEADER}" \
            -H "${ACCEPT_HEADER}" \
            "${API_ROOT}/pages/builds")"

          case "${build_status}" in
            201|204)
              echo "[OK] 已请求 GitHub Pages 使用最新 main 重新构建。"
              ;;
            409)
              echo "[WARN] GitHub Pages 当前已有构建任务，跳过重复请求。"
              ;;
            *)
              echo "[WARN] GitHub Pages rebuild 请求未成功。HTTP ${build_status}"
              cat /tmp/dpr-pages-build.json || true
              ;;
          esac
